<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bellwright Mod Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 2 4 6v6c0 5.1 3.4 8.7 8 10 4.6-1.3 8-4.9 8-10V6l-8-4Z" />
              <path d="M8 12h8M12 7v10" />
            </svg>
          </div>
          <div>
            <h1>Bellwright Mod Launcher</h1>
            <p id="pathLine">Scanning local mods...</p>
          </div>
        </div>
        <div class="actions">
          <button id="refreshButton" class="iconButton" title="Refresh mods" aria-label="Refresh mods">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.4 6.4L3 16" /><path d="M3 16h6v6" /><path d="M3 12A9 9 0 0 1 18.4 5.6L21 8" /><path d="M21 8h-6V2" /></svg>
          </button>
          <button id="folderButton" class="iconButton" title="Open Mods folder" aria-label="Open Mods folder">
            <svg viewBox="0 0 24 24"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-10Z" /></svg>
          </button>
          <button id="launchButton" class="launchButton">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7Z" /></svg>
            Launch
          </button>
        </div>
      </section>

      <section class="statusStrip">
        <div class="statusItem">
          <span class="label">Game</span>
          <strong id="gameState">Checking</strong>
        </div>
        <div class="statusItem">
          <span class="label">Active</span>
          <strong id="activeCount">0</strong>
        </div>
        <div class="statusItem">
          <span class="label">Available</span>
          <strong id="availableCount">0</strong>
        </div>
        <div class="statusItem">
          <span class="label">Workshop</span>
          <strong id="workshopCount">0</strong>
        </div>
      </section>

      <section class="controls">
        <div class="searchBox">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" /><path d="m20 20-3.5-3.5" /></svg>
          <input id="searchInput" type="search" placeholder="Search mods" autocomplete="off" />
        </div>
        <section class="presetSection" aria-label="Mod presets">
          <select id="presetSelect" title="Saved presets" aria-label="Saved presets">
            <option value="">No presets</option>
          </select>
          <button id="savePresetButton" class="presetButton" type="button">Save</button>
          <button id="loadPresetButton" class="presetButton" type="button" disabled>Load</button>
          <button id="deletePresetButton" class="presetIconButton" type="button" title="Delete preset" aria-label="Delete preset" disabled>
            <svg viewBox="0 0 24 24"><path d="M3 6h18" /><path d="M8 6V4h8v2" /><path d="M19 6l-1 14H6L5 6" /><path d="M10 11v5" /><path d="M14 11v5" /></svg>
          </button>
        </section>
        <section class="aboutSection" aria-label="FSD Software">
          <strong id="aboutMaker">FSD Software</strong>
          <span id="appVersion">v0.2.0</span>
          <button id="updateButton" class="updateButton" type="button">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.4 6.4L3 16" /><path d="M3 16h6v6" /><path d="M3 12A9 9 0 0 1 18.4 5.6L21 8" /><path d="M21 8h-6V2" /></svg>
            Update
          </button>
          <button id="donateButton" class="donateButton" type="button" disabled>Donate</button>
          <button id="discordButton" class="donateButton" type="button" disabled>Discord</button>
        </section>
      </section>
      <section id="updateProgress" class="updateProgress" aria-live="polite" hidden>
        <div class="updateProgressHeader">
          <strong id="updateProgressTitle">Updating launcher</strong>
          <span id="updateProgressPercent">0%</span>
        </div>
        <div class="progressTrack">
          <div id="updateProgressBar" class="progressBar"></div>
        </div>
        <p id="updateProgressMessage">Checking GitHub release...</p>
      </section>

      <section class="board" aria-live="polite">
        <section class="modColumn" data-drop-target="available">
          <div class="columnHeader">
            <div>
              <h2>Available</h2>
              <p>Installed but not active</p>
            </div>
            <strong id="availableColumnCount">0</strong>
          </div>
          <div id="availableList" class="columnList"></div>
          <div id="availableEmpty" class="columnEmpty">No inactive mods</div>
        </section>

        <section class="modColumn activeColumn" data-drop-target="active">
          <div class="columnHeader">
            <div>
              <h2>Active</h2>
              <p>Loaded by Bellwright</p>
            </div>
            <strong id="activeColumnCount">0</strong>
          </div>
          <div id="activeList" class="columnList"></div>
          <div id="activeEmpty" class="columnEmpty">Drop mods here to activate</div>
        </section>

      </section>
    </main>

    <div id="modalBackdrop" class="modalBackdrop" hidden>
      <section class="modalPanel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">Preset</h2>
        <p id="modalMessage"></p>
        <input id="modalInput" type="text" autocomplete="off" />
        <div class="modalActions">
          <button id="modalCancelButton" class="modalButton secondary" type="button">Cancel</button>
          <button id="modalConfirmButton" class="modalButton primary" type="button">Save</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="./renderer.js"></script>
  </body>
</html>
