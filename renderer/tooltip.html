<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mod tooltip</title>
    <link rel="stylesheet" href="./tooltip.css" />
  </head>
  <body>
    <aside class="tooltip">
      <div class="tooltipTop">
        <span id="status" class="pill active">Active</span>
        <strong id="title"></strong>
      </div>
      <p id="description"></p>
      <dl class="tooltipMeta">
        <div>
          <dt>Source</dt>
          <dd id="source"></dd>
        </div>
        <div>
          <dt>Folder</dt>
          <dd id="folder"></dd>
        </div>
        <div>
          <dt>Author</dt>
          <dd id="author"></dd>
        </div>
        <div>
          <dt>Version</dt>
          <dd id="version"></dd>
        </div>
        <div>
          <dt>Packages</dt>
          <dd id="packages"></dd>
        </div>
        <div>
          <dt>Path</dt>
          <dd id="path"></dd>
        </div>
      </dl>
    </aside>
    <script src="./tooltip.js"></script>
  </body>
</html>
